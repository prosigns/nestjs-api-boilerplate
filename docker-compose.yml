version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-api
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      DATABASE_TYPE: postgres
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/api
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-must-be-at-least-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-at-least-32-chars!!}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - backend-network

  postgres:
    image: postgres:15-alpine
    container_name: enterprise-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network

  mongodb:
    image: mongo:7
    container_name: enterprise-mongodb
    restart: always
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: api
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend-network

  mysql:
    image: mysql:8.0
    container_name: enterprise-mysql
    restart: always
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: api
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - backend-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: enterprise-rabbitmq
    restart: always
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - backend-network

volumes:
  postgres_data:
  mongodb_data:
  mysql_data:
  redis_data:
  rabbitmq-data:

networks:
  backend-network:
    driver: bridge 